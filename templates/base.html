<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteEstates</title>
</head>
<body>
    <header>
        <h1>EliteEstates</h1>
        <nav>
            <a href="/">Home</a>
            {% if request.user.is_authenticated %}
                <span>Welcome, {{ request.user.username }}!</span>
                {% else %}
                {% endif %}

        <hr>

    <main>

        {% endblock %}
    </main>

    <hr>
    <footer>
        <p>&copy; 2026 EliteEstates. All rights reserved.</p>
    </footer>
</body>
</html>
