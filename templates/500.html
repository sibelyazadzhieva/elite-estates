{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center;">
    <div class="container py-5 text-center">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">

                <div class="mb-5">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-danger bg-opacity-10 text-danger" style="width: 100px; height: 100px;">
                        <i class="bi bi-exclamation-octagon-fill" style="font-size: 3rem;"></i>
                    </div>
                </div>

                <h1 class="fw-bold mb-3" style="color: #2c3e50;">Something Went Wrong</h1>
                <p class="text-muted fs-5 mb-5 px-md-4">
                    Our servers are experiencing a temporary issue. Our elite maintenance team has been notified.
                </p>

                <div class="d-flex justify-content-center">
                    <a href="{% url 'home' %}" class="btn-elite-primary px-5">
                        Back to Safety
                    </a>
                </div>

                <div class="mt-5 pt-5 border-top small text-muted">
                    Error Code: <span class="fw-bold">500 Internal Server Error</span>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
