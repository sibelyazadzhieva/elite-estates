{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm mt-4 border-danger">
            <div class="card-body text-center">
                <h3 class="text-danger mb-4">Cancel Appointment?</h3>
                <p class="fs-5">Are you sure you want to cancel your viewing for <strong>{{ object.property.title }}</strong> on <strong>{{ object.date_and_time|date:"F d, Y H:i" }}</strong>?</p>
                <p class="text-muted">This action cannot be undone.</p>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, Cancel it</button>
                    <a href="{% url 'my_appointments' %}" class="btn btn-secondary">No, Keep it</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
